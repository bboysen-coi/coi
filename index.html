  if(!pc){err.textContent='Please enter the passcode.';return;}
  btn.disabled=true;btn.textContent='Unlocking...';
  try{
    var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pc),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(SALT),iterations:ITER,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    var plain=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(IV)},key,b64(DATA));
    var html=new TextDecoder().decode(plain);
    var f=document.createElement('iframe');
    f.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;border:0;margin:0';
    f.setAttribute('title','IT Infrastructure Training');
    document.body.style.margin='0';
    document.body.innerHTML='';
    document.body.appendChild(f);
    f.srcdoc=html;
  }catch(e){
    btn.disabled=false;btn.textContent='Unlock';
    err.textContent='Incorrect passcode. Please try again.';
    document.getElementById('pc').select();
  }
}
</script>
</body>
</html>
